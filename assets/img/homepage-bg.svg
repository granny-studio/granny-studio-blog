<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Granny Studio homepage background</title>
  <desc id="desc">A moody creative workspace scene with subtle motion for the homepage background.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="50%" stop-color="#15263d"/>
      <stop offset="100%" stop-color="#d16f3b"/>
      <animate attributeName="x1" values="0;1;0" dur="28s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="0;0.2;0" dur="28s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f6c177" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#f6c177" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f6c177" stop-opacity="0.0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.2 0;0.2 0;-0.2 0" dur="16s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="lamp" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd9a0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffd9a0" stop-opacity="0"/>
      <animate attributeName="r" values="38%;45%;38%" dur="8s" repeatCount="indefinite"/>
    </radialGradient>
    <filter id="blurSoft">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>

  <circle cx="1240" cy="240" r="180" fill="url(#lamp)" filter="url(#blurSoft)" opacity="0.9">
    <animateTransform attributeName="transform" type="translate" values="0 0; 18 -8; 0 0" dur="12s" repeatCount="indefinite"/>
  </circle>

  <g opacity="0.28">
    <rect x="150" y="150" width="620" height="300" rx="16" fill="#f8f7f2"/>
    <rect x="180" y="180" width="560" height="240" rx="12" fill="#122033"/>
    <rect x="600" y="205" width="110" height="170" rx="14" fill="#d9d4ca"/>
    <rect x="250" y="260" width="260" height="18" rx="9" fill="#ffd9a0"/>
    <rect x="250" y="300" width="180" height="14" rx="7" fill="#7da0c5"/>
    <rect x="250" y="336" width="220" height="14" rx="7" fill="#56718b"/>
  </g>

  <g opacity="0.24">
    <rect x="1100" y="140" width="270" height="36" rx="18" fill="#f7d7b5"/>
    <rect x="1060" y="188" width="340" height="26" rx="13" fill="#8bb3d6"/>
    <rect x="1140" y="232" width="180" height="14" rx="7" fill="#f3f0e8"/>
  </g>

  <g transform="translate(0 0)" opacity="0.18">
    <path d="M0,720 C280,650 380,680 580,740 C760,792 910,776 1140,698 C1310,642 1470,640 1600,684 L1600,900 L0,900 Z" fill="#08111c"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; -24 0; 0 0" dur="18s" repeatCount="indefinite"/>
  </g>

  <rect x="0" y="690" width="1600" height="210" fill="#09121d"/>
  <rect x="90" y="640" width="1420" height="14" rx="7" fill="url(#glow)" opacity="0.9"/>

  <g transform="translate(220 565)">
    <rect x="0" y="0" width="540" height="48" rx="24" fill="#0f1c2c"/>
    <rect x="22" y="-180" width="496" height="180" rx="22" fill="#152437"/>
    <rect x="38" y="-160" width="464" height="150" rx="14" fill="#0b1320"/>
    <rect x="64" y="-134" width="412" height="96" rx="12" fill="#20314a"/>
    <rect x="84" y="-112" width="156" height="12" rx="6" fill="#f6c177"/>
    <rect x="84" y="-86" width="210" height="10" rx="5" fill="#8bb3d6"/>
    <rect x="84" y="-63" width="190" height="10" rx="5" fill="#5f86a7"/>
    <circle cx="458" cy="-86" r="28" fill="#f6c177" opacity="0.8"/>
    <path d="M248 48 L292 116 L248 116 L210 48 Z" fill="#1b2a3f"/>
    <rect x="194" y="116" width="110" height="12" rx="6" fill="#2f4158"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -6; 0 0" dur="10s" repeatCount="indefinite"/>
  </g>

  <g opacity="0.6">
    <circle cx="1140" cy="580" r="5" fill="#ffd9a0"/>
    <circle cx="1180" cy="604" r="4" fill="#8bb3d6"/>
    <circle cx="1230" cy="590" r="3" fill="#f3f0e8"/>
    <circle cx="1275" cy="616" r="4" fill="#d16f3b"/>
    <circle cx="1335" cy="598" r="5" fill="#f6c177"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -10; 0 0" dur="14s" repeatCount="indefinite"/>
  </g>
</svg>
