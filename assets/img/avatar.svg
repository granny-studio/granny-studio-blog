<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">SangSangCat avatar</title>
  <desc id="desc">GitHub profile avatar used for the SangSangCat profile image.</desc>
  <defs>
    <clipPath id="circle-clip">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6c177"/>
      <stop offset="100%" stop-color="#d16f3b"/>
    </linearGradient>
  </defs>
  <circle cx="256" cy="256" r="256" fill="url(#border)"/>
  <image href="/granny-studio-blog/img/avatar.png" x="16" y="16" width="480" height="480" clip-path="url(#circle-clip)" preserveAspectRatio="xMidYMid slice"/>
</svg>
